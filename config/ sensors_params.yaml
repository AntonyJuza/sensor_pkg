# Example configuration file for sensor parameters
# Usage: ros2 launch sensor_pkg sensors.launch.py params_file:=/path/to/this/file

/**:
  ros__parameters:
    # DHT11 Temperature & Humidity Sensor
    dht11_node:
      pin: 7                    # WiringPi pin number (GPIO 4)
      publish_rate: 1.0         # Hz - DHT11 max rate is ~1Hz

    # MQ2 Gas Sensor
    mq2_node:
      analog_channel: 0         # MCP3008 channel for analog reading
      digital_pin: 0            # WiringPi pin for digital output
      publish_rate: 2.0         # Hz
      gas_threshold: 300.0      # PPM threshold for warnings
      
    # Flame Sensor
    flame_node:
      digital_pin: 1            # WiringPi pin for digital output
      analog_channel: 1         # MCP3008 channel (-1 to disable analog)
      publish_rate: 5.0         # Hz - fast response for safety

# Alternative pin configurations (commented out):
# If using different GPIO pins, update the WiringPi pin numbers

# Example for different pin mapping:
# dht11_node:
#   pin: 2                      # GPIO 27
#
# mq2_node:
#   digital_pin: 3              # GPIO 22
#   analog_channel: 2
#
# flame_node:
#   digital_pin: 4              # GPIO 23
#   analog_channel: 3