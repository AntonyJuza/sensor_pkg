# Example configuration file for sensor parameters
# Usage: ros2 launch sensor_pkg sensors.launch.py params_file:=/path/to/this/file

/**:
  ros__parameters:
    # DHT22 Temperature & Humidity Sensor
    dht22_node:
      gpio_pin: 27               # BCM GPIO 27 (Physical pin 13)
      publish_rate: 0.5         # Hz - DHT22 max rate is ~0.5Hz

    # MQ2 Gas Sensor
    mq2_node:
      spi_channel: 0            # MCP3008 channel for analog reading
      digital_gpio: 17          # BCM GPIO 17 (Physical pin 11)
      publish_rate: 2.0         # Hz
      gas_threshold: 300.0      # PPM threshold for warnings
      
    # Flame Sensor
    flame_node:
      digital_gpio: 18          # BCM GPIO 18 (Physical pin 12)
      spi_channel: 1            # MCP3008 channel (-1 to disable analog)
      publish_rate: 5.0         # Hz - fast response for safety

# Alternative pin configurations (commented out):
# If using different GPIO pins, update the BCM GPIO numbers

# Example for different pin mapping:
# dht11_node:
#   gpio_pin: 27                # BCM GPIO 27 (Physical pin 13)
#
# mq2_node:
#   digital_gpio: 22            # BCM GPIO 22 (Physical pin 15)
#   spi_channel: 2
#
# flame_node:
#   digital_gpio: 23            # BCM GPIO 23 (Physical pin 16)
#   spi_channel: 3